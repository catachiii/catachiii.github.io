- title: Research Experience
  type: time_table
  contents:
    - title: Research Intern
      institution: Max Planck Institute for Intelligent Systems, Tübingen, Germany 🇩🇪
      year: Apr 2023 -
      description:
        - Autonomous Learning group under the supervision of Prof. Dr. Georg Matius.
        - I worked on diverse offline imitation learning and reinforcement learning with unsupervised skill discovery on quadruped robots (SOLO12).
    - title: Research Assistant
      institution: ETH Zürich, Zürich, Switzerland 🇨🇭
      year: Nov 2022 - Mar 2023
      description:
        - Computational Robotics Lab (CRL) under the supervision of Prof. Dr. Stelian Coros.
        - I worked on imitating model-based optimal controllers with reinforcement learning for versatile behaviors on quadruped robots (Unitree Go1).
    - title: Master Thesis Student
      institution: ETH Zürich, Zürich, Switzerland 🇨🇭
      year: Mar 2022 - Oct 2022
      description:
        - Robotic Systems Lab (RSL) under the supervision of Prof. Dr. Marco Hutter.
        - I worked on imitating Model Predictive Controller (MPC) using Imitation Learning on the perceptive locomotion of quadruped robots (ANYmal).
    - title: Semester Project Student
      institution: ETH Zürich, Zürich, Switzerland 🇨🇭
      year: Sep 2021 - Feb 2022
      description:
        - Robotic Systems Lab (RSL) under the supervision of Prof. Dr. Marco Hutter.
